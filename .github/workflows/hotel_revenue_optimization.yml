name: Hospitality Data Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy matplotlib seaborn

    - name: Run Cleaning Script
      run: python hotel_booking_analysis.py 

    # Commenting this out until you upload a test_data.py file
    # - name: Validate Data Integrity
    #   run: python test_data.py
      
    - name: Upload Cleaned Data
      uses: actions/upload-artifact@v4
      with:
        name: cleaned-hospitality-data
        path: hotel_bookings_cleaned.csv
